name: Deploy Frontend to Azure Blob Static Website

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'   # Only triggers if files in frontend/ change

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
      AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az account show

      - name: Verify frontend files
        run: |
          echo "Listing frontend files..."
          ls -R frontend

      - name: Deploy frontend to Azure Blob Static Website
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name $AZURE_STORAGE_ACCOUNT \
              --account-key $AZURE_STORAGE_KEY \
              -s ./frontend \
              -d '$web' \
              --overwrite

      - name: Purge CDN endpoint (optional)
        if: always()
        uses: azure/CLI@v1
        with:
          inlineScript: |
            echo "CDN purge step can be added later if using Azure CDN"

      - name: Logout from Azure
        if: always()
        run: az logout
